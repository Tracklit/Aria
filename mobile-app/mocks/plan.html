<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plan - Aria App Mocks</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            margin-bottom: 4px;
        }

        .nav-item.active svg {
            fill: currentColor;
        }

        .day-row {
            border-bottom: 1px solid #1c1c1e;
            padding: 16px;
            background: #0c0c0e;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .day-row-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="screen">
            <div class="header" style="flex-direction: row; align-items: center;">
                <div class="title-large" style="margin: 0;">Plan</div>
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=100&h=100&fit=crop"
                    class="profile-avatar-large"
                    style="width: 60px; height: 60px; margin: 0; border: 2px solid var(--brand-cyan);" alt="Profile">
            </div>

            <div
                style="padding: 0 24px; text-transform: uppercase; letter-spacing: 1px; color: var(--brand-cyan); font-size: 13px; font-weight: 600;">
                Training plan for Alex
            </div>

            <div class="card card-gradient" style="border-radius: 16px; padding: 24px;">
                <div style="font-size: 32px; font-weight: 600; margin-bottom: 8px;">Half Marathon</div>
                <div style="font-size: 18px; font-weight: 500;">May 15</div>
            </div>

            <div style="padding: 0 24px; margin-top: 16px;">
                <div style="font-size: 22px; font-weight: 600; margin-bottom: 16px;">Schedule</div>

                <div class="day-row day-row-flex">
                    <div style="font-weight: 500; font-size: 16px;">Tuesday</div>
                    <div style="color: var(--brand-blue); font-size: 16px;">Rest Day</div>
                </div>

                <div class="day-row" style="display: flex;">
                    <div style="font-weight: 500; font-size: 16px; width: 100px;">Wednesda</div>
                    <div>
                        <div style="color: var(--brand-blue); font-size: 16px; margin-bottom: 4px;">Intervals</div>
                        <div style="color: var(--text-secondary); font-size: 14px;">5 × 400m, 90% effort</div>
                    </div>
                </div>

                <div class="day-row day-row-flex">
                    <div style="font-weight: 500; font-size: 16px;">Thursday</div>
                    <div style="color: var(--brand-blue); font-size: 16px;">Cross Training</div>
                </div>

                <div class="day-row day-row-flex">
                    <div style="font-weight: 500; font-size: 16px;">Friday</div>
                    <div style="color: var(--brand-blue); font-size: 16px;">Intervals</div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="chat.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                Chat
            </a>
            <a href="index.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Dashboard
            </a>
            <a href="plan.html" class="nav-item active">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Plan
            </a>
            <a href="settings.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="1"></circle>
                    <circle cx="19" cy="12" r="1"></circle>
                    <circle cx="5" cy="12" r="1"></circle>
                </svg>
                ...More
            </a>
        </nav>
    </div>
    <script src="app.js"></script>
</body>

</html>
