<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings - Aria App Mocks</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            margin-bottom: 4px;
        }

        .nav-item.active svg {
            fill: currentColor;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="screen">
            <div class="header">
                <div class="title-large">Settings</div>
            </div>

            <div class="settings-section-title">ACCOUNT</div>
            <div class="settings-list">
                <a href="profile.html" class="settings-row"
                    style="text-decoration: none; color: inherit; display: flex;">
                    <span style="font-size: 16px; font-weight: 500;">Edit Profile</span>
                    <span style="color: #666;">></span>
                </a>
                <div class="settings-row">
                    <span style="font-size: 16px; font-weight: 500;">Notifications</span>
                    <span style="color: #666;">></span>
                </div>
            </div>

            <div class="settings-section-title">GENERAL</div>
            <div class="settings-list">
                <div class="settings-row">
                    <span style="font-size: 16px; font-weight: 500;">Units of Measure</span>
                    <span style="color: #666;">></span>
                </div>
                <div class="settings-row">
                    <span style="font-size: 16px; font-weight: 500;">Voice Feedback</span>
                    <span style="color: #666;">></span>
                </div>
            </div>

            <div class="settings-section-title">INTEGRATIONS</div>
            <div class="settings-list">
                <div class="settings-row">
                    <span style="font-size: 16px; font-weight: 500;">Apple Health</span>
                    <span style="color: #666;">></span>
                </div>
                <div class="settings-row">
                    <span style="font-size: 16px; font-weight: 500;">Garmin</span>
                    <span style="color: #666;">></span>
                </div>
            </div>

            <div style="text-align: center; margin-top: 40px; margin-bottom: 20px;">
                <a href="onboarding.html"
                    style="color: var(--brand-blue); font-size: 18px; font-weight: 500; cursor: pointer; text-decoration: none;">Log
                    Out</a>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="chat.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                Chat
            </a>
            <a href="index.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Dashboard
            </a>
            <a href="plan.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Plan
            </a>
            <a href="settings.html" class="nav-item active">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="1"></circle>
                    <circle cx="19" cy="12" r="1"></circle>
                    <circle cx="5" cy="12" r="1"></circle>
                </svg>
                ...More
            </a>
        </nav>
    </div>
    <script src="app.js"></script>
</body>

</html>
