<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Aria App Mocks</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            margin-bottom: 4px;
        }

        .nav-item.active svg {
            fill: currentColor;
        }

        .profile-border-gradient {
            background: linear-gradient(var(--bg-dark), var(--bg-dark)) padding-box, linear-gradient(135deg, var(--brand-blue), var(--brand-green)) border-box;
            border: 4px solid transparent;
        }

        .avatar-glow {
            position: relative;
        }

        .avatar-glow::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.15) 0%, transparent 70%);
            z-index: 0;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="screen">
            <div class="header" style="padding-bottom: 0;">
                <div
                    style="display: flex; justify-content: center; align-items: center; width: 100%; position: relative; margin-bottom: 20px;">
                    <div
                        style="background: var(--bg-card); border-radius: 50%; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; position: absolute; top: -10px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--brand-cyan)"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </div>
                </div>
                <div class="title-large" style="text-align: center; width: 100%; margin-top: 20px;">Good Morning, Alex
                </div>
                <div class="subtitle" style="text-align: center; width: 100%; color: var(--brand-cyan);">Let's get
                    faster today 🚀</div>
            </div>

            <div class="avatar-glow" style="display: flex; justify-content: center; margin: 30px 0;">
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200&h=200&fit=crop"
                    class="profile-avatar-large profile-border-gradient" alt="Alex Profile">
            </div>

            <div class="card card-gradient" style="border-radius: 20px;">
                <div style="font-size: 24px; font-weight: 600; margin-bottom: 4px;">Sprint Intervals</div>
                <div style="font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 20px;">6 × 150m, 90% effort
                </div>
                <a href="track.html" class="btn"
                    style="background: linear-gradient(90deg, #007aff, #00e676); border-radius: 12px; font-weight: 600; text-decoration: none; display: flex;">Start
                    Session</a>
            </div>

            <div style="padding: 0 24px; margin-top: 24px;">
                <div style="font-size: 20px; font-weight: 600; margin-bottom: 16px;">Latest Stats</div>
                <div class="stats-row" style="padding: 0;">
                    <div class="stat-item">
                        <div class="stat-circle">
                            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--brand-blue)"
                                stroke-width="2">
                                <path
                                    d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
                            </svg>
                        </div>
                        <div class="stat-value">4.2 <span
                                style="font-size: 14px; color: var(--text-secondary); font-weight: normal;">mi</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-circle">
                            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--brand-blue)"
                                stroke-width="2">
                                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                            </svg>
                        </div>
                        <div class="stat-value">7:03</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-circle" style="border-color: var(--brand-green);">
                            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--brand-green)"
                                stroke-width="2">
                                <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                            </svg>
                        </div>
                        <div class="stat-value">15 <span
                                style="font-size: 14px; color: var(--text-secondary); font-weight: normal;">h</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card"
                style="background: #111111; display: flex; align-items: center; gap: 16px; margin-top: 24px; border-radius: 16px;">
                <div style="font-size: 32px;">🏆</div>
                <div>
                    <div style="font-size: 18px; font-weight: 600;">Consistency King</div>
                    <div style="font-size: 14px; color: var(--text-secondary);">7-day streak</div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="chat.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                Chat
            </a>
            <a href="index.html" class="nav-item active">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Dashboard
            </a>
            <a href="plan.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Plan
            </a>
            <a href="settings.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="1"></circle>
                    <circle cx="19" cy="12" r="1"></circle>
                    <circle cx="5" cy="12" r="1"></circle>
                </svg>
                ...More
            </a>
        </nav>
    </div>
    <script src="app.js"></script>
</body>

</html>
