<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile Setup - Aria App Mocks</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <div class="screen">
            <div class="header">
                <div class="title-large">Set up your profile</div>
                <div class="subtitle" style="color: var(--brand-cyan); font-size: 16px; margin-top: 8px;">Tell us about
                    yourself to personalize the experience.</div>
            </div>

            <div style="display: flex; justify-content: center; margin: 40px 0;">
                <div
                    style="width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--brand-cyan); display: flex; justify-content: center; align-items: center;">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <div
                    style="border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 24px; display: flex; justify-content: space-between;">
                    <span style="font-size: 18px;">Name</span>
                    <span style="color: #666;"></span>
                </div>
                <div
                    style="border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 24px; display: flex; justify-content: space-between;">
                    <span style="font-size: 18px;">Gender</span>
                    <span style="color: #666;"></span>
                </div>
                <div
                    style="border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 24px; display: flex; justify-content: space-between;">
                    <span style="font-size: 18px;">Date of Birth</span>
                    <span style="color: #666;">MM/DD/YYYY</span>
                </div>
            </div>

            <div style="padding: 20px 24px; margin-top: 40px;">
                <a href="index.html" class="btn btn-primary"
                    style="background: #007aff; border-radius: 12px; text-decoration: none; display: flex; align-items: center; justify-content: center;">Continue</a>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
