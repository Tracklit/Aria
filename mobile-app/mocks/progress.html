<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Progress - Aria App Mocks</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            margin-bottom: 4px;
        }

        .nav-item.active svg {
            stroke: var(--brand-blue);
        }

        .nav-item.active {
            color: var(--brand-blue);
        }

        .weekly-summary {
            background: #111;
            border-radius: 20px;
            padding: 24px;
            margin: 20px 24px;
        }

        .chart-container {
            position: relative;
            height: 120px;
            margin: 20px 0;
            border-bottom: 1px solid #333;
        }

        .chart-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .chart-area {
            fill: url(#chart-gradient);
            stroke: none;
        }

        .chart-line {
            fill: none;
            stroke: #007AFF;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .x-axis {
            display: flex;
            justify-content: space-between;
            color: #8E8E93;
            font-size: 12px;
            margin-top: 8px;
            font-weight: 500;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
            margin-top: 24px;
        }

        .stat-main {
            font-size: 20px;
            font-weight: 700;
            color: #FFF;
            margin-bottom: 4px;
        }

        .stat-sub {
            font-size: 12px;
            color: #8E8E93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .advanced-analytics {
            padding: 0 24px;
            margin-top: 32px;
        }

        .adv-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 12px;
        }

        .adv-col {
            display: flex;
            flex-direction: column;
            width: 45%;
        }

        .adv-label {
            font-size: 14px;
            color: #FFF;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .adv-label.right {
            text-align: right;
            color: #8E8E93;
        }

        .adv-label.right.white {
            color: #FFF;
        }

        .mini-chart {
            height: 30px;
            width: 100%;
        }

        .mini-line {
            fill: none;
            stroke: #007AFF;
            stroke-width: 2;
        }

        .thick-bar {
            height: 8px;
            background: #007AFF;
            border-radius: 4px;
            width: 80%;
            margin-left: auto;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="screen" style="overflow-y: auto; padding-bottom: 90px; background: #000;">
            <!-- Header -->
            <div style="padding: 40px 24px 10px;">
                <div style="font-size: 34px; font-weight: 700; color: #FFF; margin-bottom: 4px;">Progress</div>
                <div style="font-size: 18px; color: #007AFF; font-weight: 500;">Analytics Dashboard</div>
            </div>

            <!-- Weekly Summary -->
            <div class="weekly-summary">
                <div style="font-size: 20px; font-weight: 600; color: #FFF;">Weekly Summary</div>

                <div class="chart-container">
                    <svg class="chart-svg" viewBox="0 0 300 100" preserveAspectRatio="none">
                        <defs>
                            <linearGradient id="chart-gradient" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stop-color="rgba(0, 122, 255, 0.4)" />
                                <stop offset="100%" stop-color="rgba(0, 122, 255, 0)" />
                            </linearGradient>
                        </defs>
                        <!-- Area Fill -->
                        <path class="chart-area"
                            d="M0,80 C40,70 60,30 100,50 C140,70 160,20 200,40 C240,60 260,10 300,30 L300,100 L0,100 Z" />
                        <!-- Line -->
                        <path class="chart-line"
                            d="M0,80 C40,70 60,30 100,50 C140,70 160,20 200,40 C240,60 260,10 300,30" />
                    </svg>
                </div>

                <div class="x-axis">
                    <span>S</span>
                    <span>M</span>
                    <span>T</span>
                    <span>W</span>
                    <span>T</span>
                    <span>F</span>
                    <span>S</span>
                </div>

                <div class="stats-grid">
                    <div>
                        <div class="stat-main">14.2 <span style="font-size: 14px; font-weight: normal;">mi</span></div>
                        <div class="stat-sub">Distance</div>
                    </div>
                    <div>
                        <div class="stat-main">2<span style="font-size: 14px; font-weight: normal;">h</span> 5<span
                                style="font-size: 14px; font-weight: normal;">m</span></div>
                        <div class="stat-sub">Duration</div>
                    </div>
                    <div>
                        <div class="stat-main">9'16"</div>
                        <div class="stat-sub">Avg. Pace</div>
                    </div>
                </div>
            </div>

            <!-- Advanced Analytics -->
            <div class="advanced-analytics">
                <div style="font-size: 20px; font-weight: 600; color: #FFF; margin-bottom: 16px;">Advanced Analytics
                </div>

                <!-- Row 1 -->
                <div class="adv-row">
                    <div class="adv-col">
                        <div class="adv-label">Training Load</div>
                        <svg class="mini-chart" viewBox="0 0 100 30" preserveAspectRatio="none">
                            <path class="mini-line" d="M0,20 Q25,5 50,15 T100,10" />
                        </svg>
                    </div>
                    <div class="adv-col">
                        <div class="adv-label right">Optimal</div>
                        <div class="thick-bar"></div>
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="adv-row">
                    <div class="adv-col">
                        <div class="adv-label">VO2 Max</div>
                        <svg class="mini-chart" viewBox="0 0 100 30" preserveAspectRatio="none">
                            <path class="mini-line" d="M0,25 Q30,15 50,20 T100,5" />
                        </svg>
                    </div>
                    <div class="adv-col">
                        <div class="adv-label right white">146 bpm</div>
                        <svg class="mini-chart" viewBox="0 0 100 30" preserveAspectRatio="none">
                            <!-- Jagged line for HR -->
                            <path class="mini-line"
                                d="M0,15 L10,15 L15,5 L20,25 L25,15 L40,15 L45,0 L50,30 L55,15 L100,15"
                                stroke-width="1.5" />
                        </svg>
                    </div>
                </div>

                <!-- Row 3 -->
                <div class="adv-row">
                    <div class="adv-col">
                        <div class="adv-label">Heart Rate</div>
                        <svg class="mini-chart" viewBox="0 0 100 30" preserveAspectRatio="none">
                            <path class="mini-line" d="M0,15 Q25,25 50,15 T100,20" />
                        </svg>
                    </div>
                    <div class="adv-col">
                        <div class="adv-label right"></div>
                        <svg class="mini-chart" viewBox="0 0 100 30" preserveAspectRatio="none">
                            <!-- Nearly flat line -->
                            <path class="mini-line" d="M0,20 Q50,18 100,22" />
                        </svg>
                    </div>
                </div>

            </div>

        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="chat.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                Chat
            </a>
            <a href="index.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Home
            </a>
            <a href="plan.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Plan
            </a>
            <a href="progress.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                Progress
            </a>
            <a href="settings.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="1"></circle>
                    <circle cx="19" cy="12" r="1"></circle>
                    <circle cx="5" cy="12" r="1"></circle>
                </svg>
                ...More
            </a>
        </nav>
    </div>
    <script src="app.js"></script>
</body>

</html>
