<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#B2F5EA"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" fill="#0D0D12"/>
  <!-- Left leg of A -->
  <line x1="512" y1="180" x2="200" y2="830" stroke="url(#grad)" stroke-width="76" stroke-linecap="round"/>
  <!-- Right leg of A -->
  <line x1="512" y1="180" x2="824" y2="830" stroke="url(#grad)" stroke-width="76" stroke-linecap="round"/>
  <!-- Cut gap for crossbar: two background-colored rects to create negative space -->
  <rect x="280" y="548" width="464" height="64" fill="#0D0D12"/>
  <!-- Crossbar / speed line drawn inside the gap -->
  <line x1="330" y1="580" x2="694" y2="580" stroke="url(#grad)" stroke-width="44" stroke-linecap="round"/>
</svg>
